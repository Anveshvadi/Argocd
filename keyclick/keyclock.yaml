apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hero
spec:
  project: default
  source:
    repoURL: https://github.com/Anveshvadi/Argocd
    path: keyclick
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      
